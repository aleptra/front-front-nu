<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <script src="https://cdn.front.nu/nightly/front.js" module="globalize;data;screen;navigate;keyboard" var="api"
    conf="debug:false;debugLocalhost:true;resetStyle:true;varsDir:assets/json/vars;storageKey:charmap"
    globalize-conf="folder:assets/json/locales"
    navigate-conf="startpage:experimental/app/charmap;startpageLocal:app/charmap">
    </script>
  <title>Character Map</title>
</head>

<body screen-layout="ultimate" font="arial">
  <div id="navloader" class="navloader pa t0 w100 bcblack03 h2px" hide>
    <div class="bcblack08"></div>
  </div>
  <header flex flexdirection="row" height="3.5rem" color="white" bgcolor="black" alignitems="center" align="center"
    justifycontent="center" padding="0.5rem">
    <span bold bindglobal="title:title" fontsize="100%" lineheight="normal" sethtml="{title}" padding="1rem"></span>
    <input id="query" type="text" padding="0 .5rem" height="100%" width="100%" globalize-get="input_search"
      placeholdercolor="silver" color="black" autocomplete="off" bindfield="search:#charmap-catalog"
      placeholder="Search for character ..." focus>
  </header>
  <main padding="1rem" bindvar="name:title;link:char;endpoint:trending;endpoint2:all" include="_includes/catalog.html">
  </main>
</body>

</html>
