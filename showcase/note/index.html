<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <script
    src="https://cdn.front.nu/nightly/front.js"
    module="data;screen;keyboard"
    var="api"
    conf="debug:false;debugLocalhost:true;resetStyle:true;varsDir:assets/json/vars;storageKey:note">
  </script>
  <title>Note</title>
</head>

<body screen-layout="simple" font="arial">
 <header flex height="4rem" fontsize="120%" paddingleft="1rem" color="white" bgcolor="black" alignitems="center"
    uppercase bold bindglobal="title:title" sethtml="{title}" align="center" justifycontent="center"></header>
  <main flex>
    <div id="loader" class="loader" hide></div>
    <textarea
      width="100%"
      height="100%"
      name="note"
      padding="1rem"
      bindasset="apikey:api.api_key;url:api.notes.url"
      bindvar="id:1"
      onvaluechange="data-reqpatch"
      data-src="{url}?id=eq.{id}"
      data-header="apikey:{apikey}"
      data-loader="#loader"
      data-reqpatch="{url}?id=eq.{id}&limit=1&order=id"
      data-enctype="application/json"
      data-get="0.note"
    >
    </textarea>
  </main>
</body>

</html>
