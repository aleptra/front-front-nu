<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="version" content="1.0.0">
  <script src="https://cdn.front.nu/nightly/front.js" module="data;screen;keyboard" var="api"
    conf="debug:false;debugLocalhost:true;resetStyle:true;varsDir:assets/json/vars;storageKey:todo">
    </script>
  <title>Todo</title>
</head>

<body screen-layout="simple" font="arial">
  <header flex height="3.5rem" fontsize="120%" color="white" bgcolor="black" alignitems="center"
    uppercase bold bindglobal="title:title" sethtml="{title}" align="center" justifycontent="center"></header>
  <main flex flexdirection="column" screen-xxs="padding:[1rem]" screen-lg="padding:[2rem]" bindasset="url:api.endpoint" bindvar="src:{url}"
    include="_includes/main.html"></main>
</body>

</html>
