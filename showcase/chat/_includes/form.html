<form
  width="100%"
  bindvar="src"
  bindasset="apikey:api.api_key"
  method="post"
  action="{src}"
  data-header="apikey:{apikey}"
  data-onsuccess="rerun:#test"
  onformsubmit="reset"
>
  <figure padding="1rem" bgcolor="white">
    <input width="100%" type="text" name="post" padding="0.5rem" border="1px inset" placeholder="Type a message" placeholdercolor="silver" autocomplete="off" required focus>
  </figure>
</form>
