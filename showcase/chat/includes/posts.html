<div id="loader" class="loader"></div>
<div id="empty" hide>Empty =(</div>
<div
  id="test"
  bindvar="src"
  bindasset="apikey:api.api_key"
  data-src="{src}?order=id.asc"
  data-header="apikey:{apikey}"
  data-loader="#loader"
  data-onempty="#empty"
  data-onsuccess="scroll:*main:[bottom]"
  data-iterate="true"
  padding="1rem"
>
  <div flex flexdirection="column" alignitems="start" margintop="1rem">
    <small color="gray" fontsize="80%" data-get="timestamp" chronotize-get="d/m H:i"></small>
    <p bgcolor="lightgray" inline color="black" padding="0.5rem" width="auto" radius="1rem" data-get="post"></p>
  </div>
</div>
