<div id="loader" class="loader"></div>
<div id="empty" hide>Empty =(</div>
<div
  id="test"
  class="box cards shade1 list bcwhite-"
  bindvar="src"
  bindasset="apikey:api.api_key"
  data-src="{src}?order=id.asc"
  data-header="apikey:{apikey}"
  data-loader="#loader"
  data-onempty="#empty"
  data-onsuccess="scroll:*main:[bottom]"
  data-iterate="true">
  <figure data-set="id:id" id="{id}" padding="1rem">
    <div>
      <small color="gray" fontsize="80%" data-get="timestamp" chronotize-get="d/m H:i"></small>
      <p class="f2 di wa bcblack01 black07 p025 pr05 pl05 mt1" radius="1rem" data-get="post"></p>
    </div>
  </figure>
</div>
