<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <script src="https://cdn.front.nu/nightly/front.js" module="chronotize;globalize;geolocalize;data;keyboard;screen;math" var="api"
    conf="debug:false;resetStyle:true;varsDir:assets/json/vars;storageKey:weather"
    globalize-conf="folder:../weather/assets/json/locales">
    </script>
  <title>Weather</title>
</head>

<body screen-layout="ultimate" font="arial">
    <header flex height="3.5rem" fontsize="120%" color="white" bgcolor="black" alignitems="center"
    uppercase bold bindglobal="title:title" sethtml="{title}" align="center" justifycontent="center">
  </header>
  <nav padding="1rem" borderbottom="1px solid black" bgcolor="whitesmoke">
    <input
      id="query"
      type="text"
      width="100%"
      placeholdercolor="silver"
      outlinecolor="black"
      border="1px solid black"
      padding="0.5rem"
      globalize-get="input_search"
      globalize-target="placeholder"
      keyboard-key="Enter"
      keyboard-action
      keyboard-scope
      bindfieldif="lastPressedKey:Enter"
      autocomplete="off"
      onsubmit="reset"
      bindfield="q:#weather-current;q:#weather-forecast"
      focus
    >
</nav>

  <main flex flexdirection="column" padding="3rem">
    <div id="loader" flex alignitems="center" justifycontent="center" height="100%" hide>Loading...</div>
    <div id="error" hide>Current error!</div>
    <div flex flexdirection="column" alignitems="center"
      id="weather-current"
      bindasset="url:api.weather.api_url;key:api.weather.api_key;city:api.weather.city"
      bindquery="q:q"
      bindglobal="lang:globalize.iso639.1"
      data-src="{url}/current.json?key={key}&q={q:{city}}&aqi=no&lang={lang}"
      data-loader="#loader"
      data-onerror="#error"
      data-wait="500"
      globalize-onsetload="rerun">
      <h2 data-get="location.name"></h5>
      <img data-get="current.condition.icon" height="72">
      <h5 data-get="current.condition.text" globalize-get></h6>
      <h1 data-get="current.temp_c" math-round insertbeforeend="°"></h1>
    </div>

    <div id="error2" hide>Forecast error!</div>
    <div id="loader2" flex alignitems="center" justifycontent="center" height="100%" hide>Loading...</div>
    <div
      flex
      flexdirection="row"
      justifycontent="center"
      gap="20"
      id="weather-forecast"
      margintop="2rem"
      bindasset="url:api.weather.api_url;key:api.weather.api_key;city:api.weather.city"
      bindquery="q:q"
      bindglobal="l:globalize.code"
      data-src="{url}/forecast.json?key={key}&q={q:{city}}&days=7&aqi=no&alerts=no&lang={l}"
      data-iterate="forecast.forecastday"
      data-loader="#loader2"
      data-onerror="#error2"
      data-wait="500"
      globalize-onsetload="rerun">
      <div flex flexdirection="column" alignitems="center">
        <p data-get="date" chronotize-get="W" globalize-get bold></p>
        <span>
          <small data-get="day.mintemp_c" math-round insertbeforeend="°"></small>
          <small data-get="day.maxtemp_c" math-round insertbeforeend="°"></small>
        </span>
        <img data-get="day.condition.icon">
      </div>
    </div>
  </main>

  <footer flex alignitems="center" justifycontent="center" padding="0.5rem">
      <select name="language" onvaluechange="globalize-set" padding="0.25rem">
        <option selected disabled globalize-get>Change language</option>
        <option value="sv">Svenska</option>
        <option value="en">English</option>
        <option value="arc">𐡀𐡓𐡌𐡉𐡀</option>
        <option value="syc">ܐܪܡܝܐ</option>
        <option value="am">አማርኛ</option>
      </select>
    </footer>
</body>

</html>
