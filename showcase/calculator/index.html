<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover">
  <script
    src="https://cdn.front.nu/nightly/front.js"
    module="screen;keyboard;math"
    conf="resetStyle:true">
  </script>
  <title>Calculator</title>
</head>

<body screen-layout="simple" bgcolor="whitesmoke" font="monospace" color="black">
  <header>
    <input
      type="text"
      id="result"
      fontsize="300%"
      color="inherit"
      value="0"
      border="0"
      width="100%"
      padding="2rem"
      onvaluechange="sanitize:[^0+(?=\d)|[^0-9,]|(,)(?=.*,)]"
      onvaluechangeif="0:settext:#reset:[AC]?settext:#reset:[C]"

      statevalue="0"
      onstatevaluechangeif="/[0-9]+/;#result;set[0]"

      disable-onbeforevaluechange="alert"
      disable-onaftervaluechange="alert"
      disable-onvaluechangenew="sanitize:number[-0][0]+symbol[0][,]"
      outline="none"
      readonly
    >
  </header>
  <main flex flexdirection="column" alignitems="center" justifycontent="center" height="100%" width="100%">
    <div grid gridcolumns="repeat(4, 1fr)" gap=".5vw" fontsize="200%" justifycontent="center" width="inherit" height="inherit" padding="inherit" paddingbottom="0">
      <button border="1px solid silver" id="reset" flex alignitems="center" fontsize="inherit" justifycontent="center" color="inherit" type="button" keyboard-key="c" keyboard-action="click" click="resetvalue;focus:#" clicktargetfield="#result" bold>AC</button>
      <button border="1px solid silver" flex alignitems="center" fontsize="inherit" justifycontent="inherit" color="inherit" type="button" keyboard-key="-" keyboard-action="click" click="insertafterbegin:[-];focus:#" clicktargetfield="#result">+/-</button>
      <button border="1px solid silver" flex alignitems="center" fontsize="inherit" justifycontent="inherit" color="inherit" type="button" keyboard-key="%" keyboard-action="click" click="insertbeforeend:[%];focus:#" clicktargetfield="#result">%</button>
      <button flex alignitems="center" fontsize="inherit" justifycontent="inherit" bgcolor="black" color="white" type="button" keyboard-key="/" keyboard-action="click" click="insertbeforeend:[/];focus:#" clicktargetfield="#result">÷</button>

      <button border="1px solid silver" flex alignitems="center" fontsize="inherit" justifycontent="inherit" color="inherit" type="button" keyboard-key="7" keyboard-action="click" click="insertbeforeend:[7];focus:#" clicktargetfield="#result">7</button>
      <button border="1px solid silver" flex alignitems="center" fontsize="inherit" justifycontent="center" color="inherit" type="button" keyboard-key="8" keyboard-action="click" click="insertbeforeend:[8];focus:#" clicktargetfield="#result">8</button>
      <button border="1px solid silver" flex alignitems="center" fontsize="inherit" justifycontent="center" color="inherit" type="button" keyboard-key="9" keyboard-action="click" click="insertbeforeend:[9];focus:#" clicktargetfield="#result">9</button>
      <button flex alignitems="center" fontsize="inherit" justifycontent="center" bgcolor="black" color="white" type="button" keyboard-key="*" keyboard-action="click" click="insertbeforeend:[*];focus:#" clicktargetfield="#result">*</button>

      <button border="1px solid silver" flex alignitems="center" fontsize="inherit" justifycontent="center" color="inherit" type="button" keyboard-key="4" keyboard-action="click" click="insertbeforeend:[4];focus:#" clicktargetfield="#result">4</button>
      <button border="1px solid silver" flex alignitems="center" fontsize="inherit" justifycontent="center" color="inherit" type="button" keyboard-key="5" keyboard-action="click" click="insertbeforeend:[5];focus:#" clicktargetfield="#result">5</button>
      <button border="1px solid silver" flex alignitems="center" fontsize="inherit" justifycontent="center" color="inherit" type="button" keyboard-key="6" keyboard-action="click" click="insertbeforeend:[6];focus:#" clicktargetfield="#result">6</button>
      <button flex alignitems="center" fontsize="inherit" justifycontent="center" bgcolor="black" color="white" type="button" keyboard-key="-" keyboard-action="click" click="insertbeforeend:[-];focus:#" clicktargetfield="#result">-</button>

      <button border="1px solid silver" flex alignitems="center" fontsize="inherit" justifycontent="center" color="inherit" type="button" keyboard-key="1" keyboard-action="click" click="insertbeforeend:[1];focus:#" clicktargetfield="#result">1</button>
      <button border="1px solid silver" flex alignitems="center" fontsize="inherit" justifycontent="center" color="inherit" type="button" keyboard-key="2" keyboard-action="click" click="insertbeforeend:[2];focus:#" clicktargetfield="#result">2</button>
      <button border="1px solid silver" flex alignitems="center" fontsize="inherit" justifycontent="center" color="inherit" type="button" keyboard-key="3" keyboard-action="click" click="insertbeforeend:[3];focus:#" clicktargetfield="#result">3</button>
      <button flex alignitems="center" fontsize="inherit" justifycontent="center" bgcolor="black" color="white" type="button" keyboard-key="+" keyboard-action="click" click="insertbeforeend:[+];focus:#" clicktargetfield="#result">+</button>

      <button border="1px solid silver" flex alignitems="center" fontsize="inherit" justifycontent="center" color="inherit" gridcolumn="span 2" type="button" keyboard-key="0" keyboard-action="click" click="insertbeforeend:[0];focus:#" clicktargetfield="#result">0</button>
      <button border="1px solid silver" flex alignitems="center" fontsize="inherit" justifycontent="center" color="inherit" type="button" keyboard-key="," keyboard-action="click" click="insertbeforeend:[,];focus:#" clicktargetfield="#result">,</button>
      <button flex alignitems="center" fontsize="inherit" justifycontent="center" bgcolor="black" color="white" type="button" keyboard-key="Enter" keyboard-action="click" click="math-compute:#result:#result.statevalue;focus:#">=</button>
    </div>
  </main>
</body>

</html>
