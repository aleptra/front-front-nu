<script src="https://cdn.front.nu/nightly/front.js"></script>
<title>Search</title>
<template srcdoc="../index" src="../_templates/search"></template>
<h1 id="empty" hide bindquery="q:q" class="tac">No results found for <b>{q}</b></h1>
<div
  bindasset="endpoint:api.words.endpoint"
  bindglobal="l:globalize.code"
  bindvar="src:{endpoint}&column=id,meaning_id,word&where=word.ilike.({q}*),lang_code.eq({l})"
  include="_includes/search.html">
</div>
