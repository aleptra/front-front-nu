<script src="https://cdn.front.nu/nightly/front.js"></script>
<title globalize-get>Workshop</title>
<template srcdoc="../index" src="../_templates/workshop"></template>
<article>
  <section bgcolor="white01" padding="2rem">
    <form alignitems="center" style="align-items:center">
      <h1 zoom="0.8" bindglobal="title:title" settext="{title}" globalize-get="{title}"></h1>
      <input id="filter" type="text" placeholder="Filter" onvaluechange="filtersearch--run:#items" margintop="0.5rem"
        width="15rem" padding="0.75rem 1rem" bgcolor="white01" radius="0.25rem" autocomplete="off" focus>
    </form>
  </section>

  <!--<canvas id="canvas"
      canvas-target="#canvas" canvas-grad 
      canvas-grad-orientation="vertical" canvas-grad-stops="lightgreen[0],darkgreen[1]"
      canvas-rec="0,50,3000,2000"
      class="br1" width="1000" height="1000px" zindex="-1">
  </canvas>-->

  <section screen-xs="padding:[1.5rem 1.5rem]" screen-sm="padding:[2rem 2rem]" screen-md="padding:[3rem 3rem]"
    screen-lg="padding:[1.5rem 4rem]">
    <a href="#down">
      <h3>Challenges</h3>
    </a>
    <hr class="bcblack01">
    <div id="loader" class="loader" flex></div>
    <div id="error" class="red mb2" hide>Something went wrong!</div>
    <div id="empty" class="mb2 fwb" hide>Not found!</div>
    <div id="filterEmpty" class="mb2" hide>
      <b>No challenges match your filter.</b>
      <br>
      <a screen-xxs="transform:[scale(1)]" screen-xl="transform:[scale(1.1)]"
      minheight="2.0rem" radius="1rem" paddingleft="1.3rem" paddingright="1.3rem"
        lineheight="2.5" bgcolor="white" color="black" fontsize="90%" margintop="2rem"
        click="resetvalue:#filter;filtersearch--run:#items">Clear filter</a>
    </div>
    <div id="items" bindquery="page:page" data-src="./assets/json/data/workshop.json"
      data-set="page:#page;total_pages:#pages;total_results:#results" data-iterate="workshop" data-loader="#loader"
      data-onerror="show:#error" 
      data-onempty="show:#empty"
      data-onnotempty="hide:#empty"
      filtersearch--onempty="#filterEmpty" class="cards gut5-" width="inherit">
      <a href="workshop/challenge.html?k={k}" data-set="k:key" class="br05-" bgcolor="#212121" filtersearch--select>
        <figure flexdirection="column" width="100%" class="bw1 p1">
          <figcaption class="fwb" data-get="title"></figcaption>
          <small data-get="author">Front</small>
          <small class="z09" data-get="version" jsonbefore="Version: ">Version: 0.1</small>
        </figure>
      </a>
    </div>
</article>
