<script src="https://cdn.front.nu/nightly/front.js"></script>
<title globalize-get>Attributes</title>
<template srcdoc="../../../../index" src="../../../../_templates/documentation"></template>

<article color="silver">
  <nav class="pointer" zoom="0.9" padding="0" margintop="-1.2rem" marginbottom="2.2rem" color="white" screen-xxs="hide" screen-xl="show">
    <ol padding="0">
      <li><a href="documentation" globalize-get>Documentation</a></li>
      <li><a href="#" globalize-get>Reference</a></li>
      <li><a href="#" globalize-get>FTML</a></li>
      <li color="silver" bindglobal="title:title" settext="{title}" globalize-get></li>
    </ol>
  </nav>

  <h1 color="white" zoom="0.9" bindglobal="title:title" settext="{title}" globalize-get marginbottom="2rem"
    runorder="bindglobal;settext;globalize-get"></h1>

  <form>
    <input id="filter" type="text" placeholder="Filter" filtersearch--input onvaluechange="filtersearch--run:#attributeTable"
      width="15rem" padding="0.75rem 1rem" bgcolor="white01" radius="0.25rem" autocomplete="off" focus>

    <small margintop="1rem" block>Filter by type</small>
    <div flex gap="1rem" margintop="0.5rem">
      <fieldset>
        <input type="checkbox" id="chk_core" filtersearch--group="_empty" click="filtersearch--run:#attributeTable"
          marginright=".5rem">
        <label for="chk_core">Core</label>
      </fieldset>
      <fieldset>
        <input type="checkbox" id="chk_module" filtersearch--group="_hasvalue" click="filtersearch--run:#attributeTable"
          marginright=".5rem">
        <label for="chk_module">Module</label>
      </fieldset>
    </div>
  </form>

  <section margintop="1rem">
    <div id="attributeTableEmpty" hide>
      <hr bgcolor="white" margintop="3rem">
      <b>No FTML attributes match your filter.</b>
      <br>
      <a screen-xxs="transform:[scale(1)]" screen-xl="transform:[scale(1.1)]"
        minheight="2.0rem" radius="1rem" paddingleft="1.3rem" paddingright="1.3rem"
        lineheight="2.5" bgcolor="white" color="black" fontsize="90%" margintop="2rem"
        click="resetvalue:#filter;filtersearch--run:#attributeTable">Clear filter</a>
    </div>
    <table color="white" class="mt1" width="100%" data-src="assets/json/data/references.json" data-ttl="0"
      id="attributeTable" filtersearch--onempty="#attributeTableEmpty">

      <tr id="title5">
        <td colspan="2" paddingtop="2rem">
          <h4>Interactive</h4>
          <hr bgcolor="rgba(255,255,255, .2)" margin="1rem 0">
        </td>
      </tr>
      <tbody valign="top" class="z09" data-iterate="attribute.interactive">
        <tr mouseover="bgcolor:[white01]" mouseout="bgcolor:[inherit]" filtersearch--select filtersearch--count="count5"
          if="([{count5}]:[0])/hide:#title5?show:#title5">
          <td><a href="documentation/reference/ftml/attribute/?a={d}" data-set="d:attribute" data-get="attribute"
              title="{d}"></a></td>
          <td data-get="description"></td>
          <td hide filtersearch--marker data-get="module"></td>
        </tr>
      </tbody>

      <tr id="titleContent">
        <td colspan="2" paddingtop="2rem">
          <h4>Content</h4>
          <hr bgcolor="rgba(255,255,255, .2)" margin="1rem 0">
        </td>
      </tr>
      <tbody valign="top" class="z09" data-iterate="attribute.content">
        <tr mouseover="bgcolor:[white01]" mouseout="bgcolor:[inherit]" filtersearch--select
          filtersearch--count="countContent" if="([{countContent}]:[0])/hide:#titleContent?show:#titleContent">
          <td><a href="documentation/reference/ftml/attribute/?a={d}" data-set="d:attribute" data-get="attribute"
              title="{d}"></a></td>
          <td data-get="description"></td>
          <td hide filtersearch--marker data-get="module"></td>
        </tr>
      </tbody>

      <tr id="title1">

      <tbody valign="top" class="z09" data-iterate="attribute.configuration">
        <tr mouseover="bgcolor:[white01]" mouseout="bgcolor:[inherit]" filtersearch--select filtersearch--count="count7"

    </table>
  </section>
</article>
