<script src="https://cdn.front.nu/nightly/front.js"></script>
<title globalize-get>Attribute</title>
<template srcdoc="../../../../index" src="../../../../_templates/documentation"></template>
<article color="silver" data-src="assets/json/data/v1/attributes.json" data-ttl="600000">
  <nav class="pointer" zoom="0.9" padding="0" margintop="-1.2rem" marginbottom="2.2rem" color="white">
    <ol padding="0">
      <li><a href="documentation" globalize-get>Documentation</a></li>
      <li><a href="#" globalize-get>Reference</a></li>
      <li><a href="documentation/reference/ftml" globalize-get>FTML</a></li>
      <li><a href="documentation/reference/ftml/attributes.html" bindglobal="title:title" settext="{title}"
          globalize-get>Attribute</a></li>
      <li bindquery="a:a" settext="{a}"></li>
    </ol>
  </nav>
  <h1 color="white" zoom="0.9" bindquery="a:a" settext="{a}" marginbottom="2rem" runorder="bindquery;settext"></h1>
  <section>
    <p bindquery="a:a" data-get="{a}.description_short"></p>
  </section>

  <section>
    <div id="values" paddingtop="1rem">
      <h6 zoom=".9" color="white" paddingbottom="1rem" cursor="pointer" click="toggledisplay:#valuesContent"
        globalize-get>Values ▸</h6>
      <div id="valuesContent" hide>
        <input type="text" placeholder="Filter" onvaluechange="filtersearch--run:#valuesList" maxwidth="15rem"
          padding="0.75rem 1rem" bgcolor="white01" radius="0.25rem" autocomplete="off" marginbottom="0.5rem">
        <div id="valuesEmpty" hide>No values found</div>
        <ul id="valuesList" filtersearch--onempty="#valuesEmpty" data-onkeyempty="hide:#values" bindquery="a:a"
          data-iterate="{a}.values" maxheight="300px" overflow="auto">
          <li filtersearch--select><span data-get="[*]"></span></li>
        </ul>
      </div>
    </div>
  </section>

  <section id="example" paddingtop="3rem">
    <h2 color="white" zoom="0.9" paddingbottom="1rem" globalize-get>Example</h2>
    <code id="code" bgcolor="white01" color="white" spellcheck="false" whitespace="pre" padding="1rem" font="monospace"
      syntaxhighlighting--set bindquery="a:a" data-get="{a}.example" data-ongetload="sethtml:#result:#code"></code>
  </section>

  <section id="example" paddingtop="3rem">
    <h2 color="white" zoom="0.9" paddingbottom="1rem" globalize-get>Result</h2>
    <div id="result" bgcolor="white" color="black" onsethtml="start:[*]" spellcheck="false" whitespace="pre"
      padding="1rem" font="monospace" relative></div>
  </section>

  <section>
    <div id="dependson" paddingtop="3rem">
      <h6 zoom=".9" color="white" paddingbottom="0.5rem" globalize-get>Depends on</h6>
      <ul data-onkeyempty="hide:#dependson" bindquery="a:a" data-iterate="{a}.depends_on">
        <li><a data-set="name:[*]" data-get="[*]" href="documentation/reference/ftml/attribute/?a={name}"></a></li>
      </ul>
    </div>

    <div id="seealso" paddingtop="3rem">
      <h6 zoom=".9" color="white" paddingbottom="1rem" globalize-get>See also</h6>
      <ul data-onkeyempty="hide:#seealso" bindquery="a:a" data-iterate="{a}.see_also">
        <li><a data-set="name:[*]" data-get="[*]" href="documentation/reference/ftml/attribute/?a={name}"></a></li>
      </ul>
    </div>

  </section>
</article>
