<script src="https://cdn.front.nu/nightly/front.js"></script>
<title globalize-get>Functions</title>
<template srcdoc="../../../../index" src="../../../../_templates/documentation"></template>
<article color="silver">
  <nav class="crumbs pointer pt05" zoom="0.9" margintop="-2rem" marginbottom="2rem" color="white">
    <ol>
      <li><a href="documentation" globalize-get>Documentation</a></li>
      <li><a href="#" globalize-get>Reference</a></li>
      <li><a href="#" globalize-get>API</a></li>
      <li color="silver" bindglobal="title:title" settext="{title}" globalize-get></li>
    </ol>
  </nav>
  <h1 color="white" zoom="0.9" bindglobal="title:title" settext="{title}" globalize-get marginbottom="2rem"
    runorder="bindglobal;settext;globalize-get"></h1>
  <form>
    <input id="filter" type="text" placeholder="Filter" onvaluechange="filtersearch--run:#functionTable" width="15rem"
      padding="0.75rem 1rem" bgcolor="white01" radius="0.25rem" autocomplete="off" focus>
  </form>
  <section margintop="1rem">
    <div id="functionTableEmpty" hide>No functions found.</div>
    <table color="white" class="mt1" width="100%" data-src="assets/json/data/v1/functions.json" data-ttl="600000"
      id="functionTable" filtersearch--onempty="#functionTableEmpty">
      <tr id="titleCore">
        <td colspan="2" paddingtop="2rem">
          <h4>Core</h4>
          <hr color="darkgray" margin="0.5rem 0">
        </td>
      </tr>
      <tbody valign="top" class="z09" data-iterate="function.core">
        <tr mouseover="bgcolor:[white01]" mouseout="bgcolor:[inherit]" filtersearch--select
          filtersearch--count="countCore" if="([{countCore}]:[0])/hide:#titleCore?show:#titleCore">
          <td data-get="function"></td>
          <td data-get="description"></td>
        </tr>
      </tbody>
      <tr id="titleElement">
        <td colspan="2" paddingtop="2rem">
          <h4>Element</h4>

  </section>
