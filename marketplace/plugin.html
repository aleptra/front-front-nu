<script src="https://cdn.front.nu/nightly/front.js"></script>
<title>Plugin</title>
<template srcdoc="../../index" src="../../_templates/plugins"></template>
<div id="error" class="red" hide>Plugin not found!</div>
<div id="loader" class="loader"></div>
<hr class="bcblack01">
<section bindquery="k:k" data-src="./assets/json/data/extensions.json" data-filterkey="extensions"
  data-filteritem="key:'{k}'" data-loader="#loader" data-set="title:title" data-onerror="show:#error"
  data-onfinish="doctitle:[{title}];settext:#title:[{title}]">
  <a class="button"
    bgcolor="white"
    color="black"
    minwidth="9rem"
    minheight="2.7rem"
    radius="1rem"
    paddingleft="1.25rem"
    paddingright="1.25rem"
    lineheight="2.7"
    float="right"
    target="_blank"
    data-set="key:key"
    href="https://playground.front.nu/?slug={key}&id=0">Launch Demo</a>
  <div flex>
    <a paddingright="1rem">
      <figure class="p05" bgcolor="#212121" padding="1rem">
        <img class="w5r m0a" data-get="icon">
      </figure>
    </a>
    <div flexdirection="column">
      <h3 id="title"></h3>
      <b data-get="author"></b>
    </div>
  </div>

  <h4 margintop="2rem">Description</h4>
  <hr color="darkgray" margin="0.5rem 0">
  <div color="white" data-get="description"></div>

  <div>
    <h4 margintop="2rem">Attributes</h4>
    <hr color="darkgray" margin="0.5rem 0">
    <table color="white" width="100%">
      <tbody valign="top" data-iterate="attributes.markup">
        <tr>
          <td data-get="attribute"></td>
          <td data-get="description"></td>
        </tr>
      </tbody>
    </table>

      <h4 margintop="2rem">Config</h4>
      <hr color="darkgray" margin="0.5rem 0">
      <table id="config" color="white" width="100%">
        <tbody valign="top" data-iterate="attributes.config" data-onkeyempty="hide:#config;show:#emptyConfig">
          <tr>
            <td data-get="key"></td>
            <td data-get="value"></td>
          </tr>
        </tbody>
      </table>
      <span id="emptyConfig" color="silver" hide>No configuration available</span>
  </div>
</section>
